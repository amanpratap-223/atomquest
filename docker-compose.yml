version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: atomquest_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: atomquest

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: atomquest_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/atomquest
      - JWT_SECRET=${JWT_SECRET:-atomquest-super-secret-key}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - PORT=5000
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: atomquest_client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
